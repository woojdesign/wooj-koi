<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d1016">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>koi clock</title>
<style>
  @font-face {
    font-family: "Big Bird";
    /* Absolute path: /clock is served with AND without a trailing slash, and a relative
       "fonts/…" breaks (404) when opened as /clock — which is what iOS did. */
    src: url("/clock/fonts/TAYBigBirdRegular.woff2") format("woff2"),
         url("/clock/fonts/TAYBigBirdRegular.woff") format("woff");
    font-weight: 400; font-style: normal; font-display: swap;
  }
  :root {
    --warm: #e9e4d8;
    --mono: "Geist Mono", ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace;
    --sans: "Geist", -apple-system, system-ui, "Segoe UI", Helvetica, Arial, sans-serif;
    --display: "Big Bird", "Geist", -apple-system, system-ui, sans-serif; /* humanist time face */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #0d1016;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  /* Time-of-day gradient pond, behind the (mostly-transparent) koi canvas. Set by JS. */
  #bg { position: fixed; inset: 0; z-index: 0; background: #0d1016; }
  #pond { position: fixed; inset: 0; z-index: 1; }
  #pond canvas { display: block; }

  /* Veil that dims the koi at night (kept subtle now that the gradient darkens too). */
  #veil { position: fixed; inset: 0; z-index: 2; background: #06070c; opacity: 0; pointer-events: none; transition: opacity 4s ease; }

  /* Grid: one consistent margin, everything left-aligned to a single column edge, vertically
     centred. Calm through order (Müller-Brockmann) — few elements, lots of field for the koi. */
  #clock {
    position: fixed; inset: 0; z-index: 3;
    display: flex; align-items: center; justify-content: flex-start;
    color: var(--warm);
    transition: opacity 4s ease;
    -webkit-user-select: none;
    /* Design margin ADDED to the safe-area inset, not max'd — so in landscape the content clears
       the Dynamic Island/notch with breathing room instead of hugging its inner edge. */
    padding: calc(env(safe-area-inset-top) + 5.5vmin) calc(env(safe-area-inset-right) + 5.5vmin)
             calc(env(safe-area-inset-bottom) + 5.5vmin) calc(env(safe-area-inset-left) + 5.5vmin);
  }
  .panel { display: flex; flex-direction: column; align-items: flex-start; text-align: left; }

  /* Digital — Big Bird (humanist) time, capped so it stays calm on large screens; Geist Mono
     chrome hangs off the same left edge. Big Bird ships a single Regular weight. */
  .digital { font-family: var(--display); }
  .digital .time {
    font-weight: 400;
    font-size: clamp(3.25rem, 26vmin, 9.5rem);
    letter-spacing: -0.01em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    margin-left: -0.15em;   /* null Big Bird's ~0.15em digit left side-bearing → ink sits on the margin */
  }
  /* Colophon: tiered metadata under the time — tracked micro-caps, tabular figures, hierarchy
     by opacity. Everything hangs off the same left margin (−0.15em nulls the digit bearing). */
  .digital .meta {
    display: flex; align-items: center; gap: 0.85em;
    font-family: var(--display); letter-spacing: 0.2em; text-transform: uppercase;
    font-variant-numeric: tabular-nums; white-space: nowrap;
    margin-left: -0.15em;
  }
  .digital .tier1 { margin-top: 1.4rem; font-size: clamp(0.76rem, 1.65vmin, 1.05rem); opacity: 0.6; }
  .digital .tier2 { margin-top: 0.7rem; font-size: clamp(0.66rem, 1.4vmin, 0.9rem);  opacity: 0.38; }
  .digital .moon { width: 1.2em; height: 1.2em; flex: none; }
  .digital .moon-base { fill: var(--warm); opacity: 0.16; }
  .digital .moon-lit  { fill: var(--warm); }

  /* Hourly forecast strip (Open-Meteo): minimal line icons + tabular temps, editorial micro. */
  .forecast {
    margin-top: 2rem; margin-left: -0.15em;
    display: flex; gap: clamp(1.1rem, 3.2vmin, 2.4rem);
    font-family: var(--display); opacity: 0.42;
    font-variant-numeric: tabular-nums;
  }
  .forecast .fc { display: flex; flex-direction: column; align-items: center; gap: 0.5em; }
  .forecast .fc-time { font-size: clamp(0.56rem, 1.2vmin, 0.76rem); letter-spacing: 0.16em; text-transform: uppercase; opacity: 0.7; }
  .forecast .fc-ico { width: clamp(1.3rem, 3.4vmin, 1.9rem); height: clamp(1.3rem, 3.4vmin, 1.9rem); }
  .forecast .fc-ico * { fill: none; stroke: var(--warm); stroke-width: 5.5; stroke-linecap: round; stroke-linejoin: round; }
  .forecast .fc-temp { font-size: clamp(0.72rem, 1.6vmin, 1rem); }

  /* Analog */
  .analog { width: min(46vmin, 100%); height: min(46vmin, 100%); }
  .analog .tick { stroke: var(--warm); stroke-width: 1.4; opacity: 0.28; }
  .analog .tick.h { opacity: 0.5; stroke-width: 2; }
  .analog .hand { stroke: var(--warm); stroke-linecap: round; }
  .analog .hour { stroke-width: 4.5; opacity: 0.9; }
  .analog .minute { stroke-width: 3; opacity: 0.9; }
  .analog .pin { fill: var(--warm); opacity: 0.9; }

  .hidden { display: none; }

  #hint {
    position: fixed; left: 0; right: 0; bottom: env(safe-area-inset-bottom, 1.5rem); bottom: max(env(safe-area-inset-bottom), 1.5rem);
    z-index: 4; text-align: center; color: var(--warm); opacity: 0.35;
    font-family: var(--display); font-size: 0.9rem; letter-spacing: 0.16em; text-transform: lowercase;
    transition: opacity 1.2s ease; pointer-events: none;
  }
</style>
</head>
<body>
  <div id="bg"></div>
  <div id="pond"></div>
  <div id="veil"></div>
  <div id="clock">
    <div class="panel">
      <!-- Digital -->
      <div class="digital" id="digital">
        <div class="time" id="dTime">–:–</div>
        <div class="meta tier1"><span id="dNow"></span></div>
        <div class="meta tier2">
          <svg class="moon" viewBox="0 0 100 100" aria-hidden="true">
            <circle class="moon-base" cx="50" cy="50" r="46"></circle>
            <path class="moon-lit" id="moonLit"></path>
          </svg>
          <span id="dCelestial"></span>
        </div>
        <div class="forecast" id="forecast"></div>
      </div>
      <!-- Analog -->
      <svg class="analog hidden" id="analog" viewBox="-150 -150 300 300" aria-hidden="true">
        <g id="ticks"></g>
        <line class="hand hour"   id="hHour"   x1="0" y1="0" x2="0" y2="-62"></line>
        <line class="hand minute" id="hMinute" x1="0" y1="0" x2="0" y2="-100"></line>
        <circle class="pin" r="4"></circle>
      </svg>
    </div>
  </div>
  <div id="hint">tap to switch</div>

  <script type="module">
    import { createKoiBackground } from '../src/index.js';

    // A calm, dark night pond — a few slow koi.
    createKoiBackground({
      container: '#pond',
      assetBase: '/koi',
      count: 3,
      followPointer: false,
      background: [12, 14, 22, 9],            // faint water wash; the pond colour comes from #bg gradient
      scale: 7.7,                             // fixed mid-size (between the phone 5.5 / desktop 9.9),
                                              // so koi stay the same calm size in portrait & landscape
      physics: { maxSpeed: 0.32, maxForce: 0.035, separationWeight: 1.6, cohesionWeight: 0.7 },
    }).catch(() => {});

    // ---- Clock ----------------------------------------------------------
    const dTime = document.getElementById('dTime');
    const dNow = document.getElementById('dNow');
    const dCelestial = document.getElementById('dCelestial');
    const moonLit = document.getElementById('moonLit');
    const forecast = document.getElementById('forecast');
    const digital = document.getElementById('digital');
    const analog = document.getElementById('analog');
    const hHour = document.getElementById('hHour');
    const hMinute = document.getElementById('hMinute');
    const veil = document.getElementById('veil');
    const clock = document.getElementById('clock');
    const hint = document.getElementById('hint');
    const bg = document.getElementById('bg');

    // Build analog tick marks (12, with the hour ones bolder).
    const ticks = document.getElementById('ticks');
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2;
      const outer = 132, inner = i % 3 === 0 ? 116 : 123;
      const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      ln.setAttribute('x1', (Math.sin(a) * inner).toFixed(2));
      ln.setAttribute('y1', (-Math.cos(a) * inner).toFixed(2));
      ln.setAttribute('x2', (Math.sin(a) * outer).toFixed(2));
      ln.setAttribute('y2', (-Math.cos(a) * outer).toFixed(2));
      ln.setAttribute('class', i % 3 === 0 ? 'tick h' : 'tick');
      ticks.appendChild(ln);
    }

    // Ambient-brightness curve by hour (0..1): bright by day, embers deep at night.
    const ANCHORS = [[0,0.12],[3,0.06],[6,0.30],[9,0.90],[12,0.96],[18,0.90],[21,0.50],[22.5,0.32],[23.5,0.18],[24,0.12]];
    function ambient(h) {
      for (let i = 0; i < ANCHORS.length - 1; i++) {
        const [h0, b0] = ANCHORS[i], [h1, b1] = ANCHORS[i + 1];
        if (h >= h0 && h <= h1) return b0 + (b1 - b0) * ((h - h0) / (h1 - h0));
      }
      return 0.5;
    }

    // Mild time-of-day pond gradient: [hour, topRGB, bottomRGB]. All dark + low-saturation so it
    // stays gentle — cool near-black deep night, a faint warmth at dawn/dusk, soft cool blue midday.
    const GRAD = [
      [0,    [14,16,28], [7,8,14]],    // midnight — indigo → near-black
      [4,    [10,12,22], [5,6,11]],    // deep night — darkest, coolest
      [6,    [20,17,30], [9,10,17]],   // pre-dawn — faint violet
      [7.5,  [34,24,26], [12,13,22]],  // sunrise — dusty warm rose
      [9,    [22,26,34], [11,14,20]],  // morning — soft cool blue
      [12,   [24,29,38], [13,16,23]],  // midday — gentle blue, a touch lighter
      [17,   [30,27,30], [13,14,20]],  // late afternoon
      [19,   [40,26,24], [14,12,18]],  // sunset — warm amber-rose
      [20.5, [26,20,30], [11,11,18]],  // dusk — violet
      [22,   [16,16,26], [8,9,15]],    // evening — cooling indigo
      [24,   [14,16,28], [7,8,14]],
    ];
    const lerp3 = (a, b, t) => [0,1,2].map(i => Math.round(a[i] + (b[i] - a[i]) * t));
    function timeGradient(h) {
      for (let i = 0; i < GRAD.length - 1; i++) {
        const [h0, t0, b0] = GRAD[i], [h1, t1, b1] = GRAD[i + 1];
        if (h >= h0 && h <= h1) { const t = (h - h0) / (h1 - h0); return { top: lerp3(t0, t1, t), bot: lerp3(b0, b1, t) }; }
      }
      return { top: GRAD[0][1], bot: GRAD[0][2] };
    }

    // ---- Moon phase (pure date math, no location) ----------------------
    function moonPhase(date) {
      const synodic = 29.530588853, ref = Date.UTC(2000, 0, 6, 18, 14, 0);
      let p = (((date.getTime() - ref) / 86400000) % synodic) / synodic;
      return p < 0 ? p + 1 : p;            // 0 = new, 0.5 = full, 1 = new
    }
    function moonName(p) {
      if (p < 0.02 || p > 0.98) return 'new moon';
      if (p < 0.23) return 'waxing crescent';
      if (p < 0.27) return 'first quarter';
      if (p < 0.48) return 'waxing gibbous';
      if (p < 0.52) return 'full moon';
      if (p < 0.73) return 'waning gibbous';
      if (p < 0.77) return 'last quarter';
      return 'waning crescent';
    }
    // Lit region of a disc radius 46 centred (50,50): outer limb arc + elliptical terminator.
    function moonLitPath(p) {
      const r = 46, top = `50,${50 - r}`, bot = `50,${50 + r}`;
      const rx = (r * Math.abs(Math.cos(2 * Math.PI * p))).toFixed(2);
      let outer, inner;
      if (p <= 0.5) { outer = 1; inner = p < 0.25 ? 1 : 0; }   // waxing → lit on the right
      else          { outer = 0; inner = p < 0.75 ? 0 : 1; }   // waning → lit on the left
      return `M ${top} A ${r},${r} 0 0 ${outer} ${bot} A ${rx},${r} 0 0 ${inner} ${top} Z`;
    }

    // ---- Calendar index ------------------------------------------------
    function isoWeek(d) {
      const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      t.setUTCDate(t.getUTCDate() - ((t.getUTCDay() + 6) % 7) + 3);   // nearest Thursday
      const firstThu = new Date(Date.UTC(t.getUTCFullYear(), 0, 4));
      firstThu.setUTCDate(firstThu.getUTCDate() - ((firstThu.getUTCDay() + 6) % 7) + 3);
      return 1 + Math.round((t - firstThu) / (7 * 86400000));
    }
    const dayOfYear = (d) => Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
    const daysInYear = (y) => ((y % 4 === 0 && y % 100 !== 0) || y % 400 === 0) ? 366 : 365;

    // ---- Weather (Open-Meteo, free/no-key). Hardcoded location for the mockup; a permanent
    //      build would use geolocation. Minimal WMO-code → line-icon mapping. ----------------
    const LOC = { lat: 40.71, lon: -74.01, label: 'nyc' };   // TODO: geolocation for a real build
    function wmoIcon(code, isDay) {
      const sun = `<circle cx="50" cy="50" r="20"/><g><line x1="50" y1="12" x2="50" y2="20"/><line x1="50" y1="80" x2="50" y2="88"/><line x1="12" y1="50" x2="20" y2="50"/><line x1="80" y1="50" x2="88" y2="50"/><line x1="24" y1="24" x2="30" y2="30"/><line x1="70" y1="70" x2="76" y2="76"/><line x1="76" y1="24" x2="70" y2="30"/><line x1="30" y1="70" x2="24" y2="76"/></g>`;
      const moon = `<path d="M63 24 A30 30 0 1 0 63 76 A24 24 0 1 1 63 24 Z"/>`;
      const cloud = `<path d="M30 68 A16 16 0 0 1 33 37 A20 20 0 0 1 71 43 A14 14 0 0 1 70 68 Z"/>`;
      const clear = isDay ? sun : moon;
      const partly = (isDay
        ? `<circle cx="38" cy="40" r="14"/><line x1="38" y1="16" x2="38" y2="21"/><line x1="16" y1="40" x2="21" y2="40"/><line x1="22" y1="24" x2="26" y2="28"/><line x1="54" y1="24" x2="50" y2="28"/>`
        : `<path d="M50 22 A22 22 0 1 0 50 62 A17 17 0 1 1 50 22 Z"/>`)
        + `<path d="M40 74 A13 13 0 0 1 42 49 A16 16 0 0 1 73 54 A11 11 0 0 1 72 74 Z"/>`;
      const rain = cloud + `<g><line x1="38" y1="74" x2="34" y2="84"/><line x1="52" y1="74" x2="48" y2="84"/><line x1="66" y1="74" x2="62" y2="84"/></g>`;
      const snow = cloud + `<g><line x1="38" y1="78" x2="38" y2="78"/><line x1="52" y1="82" x2="52" y2="82"/><line x1="66" y1="78" x2="66" y2="78"/></g>`;
      const fog = `<line x1="22" y1="40" x2="78" y2="40"/><line x1="18" y1="54" x2="74" y2="54"/><line x1="26" y1="68" x2="70" y2="68"/>`;
      const storm = cloud + `<path d="M52 70 L44 84 L52 84 L46 96"/>`;
      let g;
      if (code === 0) g = clear;
      else if (code <= 2) g = partly;
      else if (code === 3) g = cloud;
      else if (code <= 48) g = fog;
      else if (code <= 67) g = rain;
      else if (code <= 77) g = snow;
      else if (code <= 82) g = rain;
      else if (code <= 86) g = snow;
      else g = storm;
      return `<svg class="fc-ico" viewBox="0 0 100 100">${g}</svg>`;
    }
    let weather = null;
    async function fetchWeather() {
      try {
        const u = `https://api.open-meteo.com/v1/forecast?latitude=${LOC.lat}&longitude=${LOC.lon}`
          + `&current=temperature_2m,weather_code,is_day&hourly=temperature_2m,weather_code,is_day`
          + `&temperature_unit=fahrenheit&timezone=auto&forecast_hours=8`;
        const r = await fetch(u); const j = await r.json();
        weather = j;
        renderForecast();
      } catch (e) { /* offline — the clock is fine without it */ }
    }
    function renderForecast() {
      if (!weather || !weather.hourly) return;
      const H = weather.hourly, n = Math.min(7, H.time.length);
      let html = '';
      for (let i = 0; i < n; i++) {
        const d = new Date(H.time[i]);
        let hr = d.getHours(); const ap = hr < 12 ? 'a' : 'p'; hr = hr % 12; if (hr === 0) hr = 12;
        const label = i === 0 ? 'now' : `${hr}${ap}`;
        const temp = Math.round(H.temperature_2m[i]);
        html += `<div class="fc"><span class="fc-time">${label}</span>${wmoIcon(H.weather_code[i], H.is_day[i])}<span class="fc-temp">${temp}°</span></div>`;
      }
      forecast.innerHTML = html;
    }

    function render() {
      const now = new Date();
      let h = now.getHours();
      const m = now.getMinutes();

      // Digital (12h, no leading zero, no seconds)
      const ampm = h < 12 ? 'am' : 'pm';
      let h12 = h % 12; if (h12 === 0) h12 = 12;
      dTime.textContent = `${h12}:${String(m).padStart(2, '0')}`;

      // Colophon tier 1 — now · date (temperature lives in the forecast strip's "now" column)
      const days = ['sun','mon','tue','wed','thu','fri','sat'];
      const mons = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
      dNow.textContent = `${ampm} · ${days[now.getDay()]} ${now.getDate()} ${mons[now.getMonth()]}`;

      // Colophon tier 2 — moon phase (glyph + name) · ISO week · day-of-year folio
      const p = moonPhase(now);
      moonLit.setAttribute('d', moonLitPath(p));
      dCelestial.textContent = `${moonName(p)} · w${isoWeek(now)} · ${dayOfYear(now)}/${daysInYear(now.getFullYear())}`;

      // Analog hands (smooth minute; hour advances with the minute)
      const minA = (m / 60) * 360;
      const hourA = ((h % 12) / 12) * 360 + (m / 60) * 30;
      hMinute.setAttribute('transform', `rotate(${minA})`);
      hHour.setAttribute('transform', `rotate(${hourA})`);

      // Time-of-day: gradient pond + dimming
      const hf = h + m / 60;
      const g = timeGradient(hf);
      bg.style.background = `linear-gradient(180deg, rgb(${g.top.join(',')}) 0%, rgb(${g.bot.join(',')}) 100%)`;
      const b = ambient(hf);
      veil.style.opacity = ((1 - b) * 0.6).toFixed(3);       // dim the koi at night (gradient darkens too)
      clock.style.opacity = (0.26 + 0.6 * b).toFixed(3);     // keep time faintly readable, floor ~0.26
    }
    render();
    setInterval(render, 1000);

    // Weather: fetch now + every 30 min.
    fetchWeather();
    setInterval(fetchWeather, 30 * 60 * 1000);

    // ---- Digital / analog toggle ---------------------------------------
    let mode = localStorage.getItem('koiClockMode') || 'digital';
    function applyMode() {
      digital.classList.toggle('hidden', mode !== 'digital');
      analog.classList.toggle('hidden', mode !== 'analog');
    }
    applyMode();
    let hintShown = true;
    clock.addEventListener('pointerdown', () => {
      mode = mode === 'digital' ? 'analog' : 'digital';
      localStorage.setItem('koiClockMode', mode);
      applyMode();
      if (hintShown) { hint.style.opacity = '0'; hintShown = false; }
      requestWake();
    });
    setTimeout(() => { if (hintShown) { hint.style.opacity = '0'; hintShown = false; } }, 6000);

    // ---- Keep the screen awake (best-effort; the "mockup" version) ------
    let wakeLock = null;
    async function requestWake() {
      try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
    }
    requestWake();
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') requestWake(); });
  </script>
</body>
</html>
